name: Android Build Release

on:
  push:
    tags:
      - 'apk-*'
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun run postinstall

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate version
        id: version
        run: |
          # Si c'est un tag v*, utiliser le tag comme version
          if [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # Version auto-incrémentée basée sur le numéro de run GitHub Actions
            VERSION="v1.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Restore Keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bitmesh-release.keystore

      - name: Setup Signing Config
        run: |
          cat > android/app/signing.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=bitmesh-release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          export GRADLE_OPTS="-Xmx3072m -XX:MaxMetaspaceSize=768m"
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=bitmesh-release.keystore \
            "-PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" \
            "-PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" \
            "-PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --max-workers=2
        timeout-minutes: 25
        env:
          JAVA_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=768m"

      - name: Rename APK with version
        run: |
          # Nettoyer le nom de version pour le fichier (enlever les caractères spéciaux)
          CLEAN_VERSION=$(echo "${{ steps.version.outputs.VERSION }}" | tr '/' '-' | tr ' ' '_')
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/BitMesh-${CLEAN_VERSION}.apk
          echo "APK_NAME=BitMesh-${CLEAN_VERSION}.apk" >> $GITHUB_ENV
          echo "APK_PATH=android/app/build/outputs/apk/release/BitMesh-${CLEAN_VERSION}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BitMesh-${{ steps.version.outputs.VERSION }}
          path: ${{ env.APK_PATH }}

      - name: Delete old releases (garder les 5 dernières)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "BitMesh ${{ steps.version.outputs.VERSION }}"
          body: |
            ## BitMesh ${{ steps.version.outputs.VERSION }}

            **Commit** : ${{ github.sha }}
            **Branch** : `${{ github.ref_name }}`

            ${{ contains(github.ref_name, 'v1.1') && '### 🔧 Phase 1 - Critical BLE & Security Fixes

            Cette release corrige 5 bugs critiques identifiés lors de l audit architectural :

            #### 1. BLE Protocol Version (CRITIQUE)
            - Changé `APP_PROTOCOL_VERSION` de 3 à 1 (protocole officiel MeshCore Companion)
            - Fix la connexion BLE qui échouait silencieusement

            #### 2. DataView Buffer Safety (CRITIQUE)  
            - Ajout `byteOffset` sur tous les DataView
            - Évite la corruption de données sur les sous-tableaux

            #### 3. Memory Leak Fix (CRITIQUE)
            - Cleanup des listeners BLE avec fonctions unsubscribe
            - `onPacket()` et `onBleMessage()` retournent des fonctions de cleanup
            - Évite les crashes après reconnections multiples

            #### 4. Sécurité - Logging Sensible (HAUTE)
            - Protection des logs avec `__DEV__`
            - Masquage des public keys et noms de devices en production

            #### 5. BLE_MAX_WRITE Documenté (MINEUR)
            - Valeur 182 bytes vérifiée (MTU 185 - 3 overhead)

            ### Fichiers Modifiés
            - `utils/ble-gateway.ts`
            - `providers/BleProvider.tsx`
            - `providers/MessagesProvider.ts`

            ### Tests Requis
            - [ ] Connexion BLE device MeshCore
            - [ ] RESP_SELF_INFO reçu sous 3s
            - [ ] Envoi/réception messages
            - [ ] 5x reconnexion sans crash' || '### Fonctionnalités
            - Messagerie P2P via MQTT et BLE/LoRa
            - Encryption E2E (ECDH + AES-GCM)
            - Wallet Bitcoin avec envoi/réception
            - Cashu tokens
            - SQLite persistence
            - Message retry et ACKs
            - Compression Smaz
            - Chunking pour messages longs' }}

            ### Installation
            1. Télécharger le fichier `.apk` ci-dessous
            2. Autoriser l'installation depuis sources inconnues  
            3. Installer et profiter !
          files: ${{ env.APK_PATH }}
          prerelease: ${{ contains(github.ref_name, 'v1.1') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
